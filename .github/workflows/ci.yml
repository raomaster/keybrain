name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest
      - name: Install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt --quiet
      - name: Make scripts executable
        run: chmod +x bin/kb bin/process-inbox.sh bin/kb-index bin/kb-search-semantic bin/kb-import-chatgpt bin/kb-update setup/test-install.sh
      - name: Run unit tests
        run: python3 -m pytest tests/unit/ -v
      - name: Run smoke tests
        run: KB_VAULT="$GITHUB_WORKSPACE" bash setup/test-install.sh
